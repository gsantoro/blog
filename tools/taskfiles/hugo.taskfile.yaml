# https://taskfile.dev

version: '3'

tasks:
  default:
    cmds:
      - task: dev

  dev:
    cmds:
      - hugo serve --disableFastRender --buildDrafts

  prod:
    cmds:
      - hugo serve

  publish:
    cmds:
      - hugo

  theme:
    cmds:
      - git submodule add -f https://github.com/gsantoro/LoveIt.git themes/LoveIt

  open:
    cmds:
      - open http://localhost:1313/

  post:
    cmds:
      - hugo new posts/{{.TIMESTAMP}}.md
    vars:
      TIMESTAMP:
        sh: date +%Y%m%d%H%M%S
